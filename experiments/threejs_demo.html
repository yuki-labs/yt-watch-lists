<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js PBR Neumorphism</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0e5ec;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #444;
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="info">Actual 3D Render (Three.js)<br>MeshPhysicalMaterial + Real Shadows</div>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { RoundedBoxGeometry } from 'https://unpkg.com/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js';

        // 1. Setup Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0e5ec); // Match our theme

        // 2. Camera (Orthographic for UI look)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        camera.position.set(0, 0, 20); // Top down view? Or slightly tilted?
        // Let's do straight top-down to match 2D UI, but lights will give depth.
        // Actually, perspective or slight tilt helps see the 3D nature.
        // Let's keep it straight ON for "UI" feel, relying on lighting.
        camera.lookAt(scene.position);

        // 3. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft shadows
        document.body.appendChild(renderer.domElement);

        // 4. Geometry (The Button)
        // RoundedBoxGeometry( width, height, depth, radius, smoothness )
        const geometry = new RoundedBoxGeometry(4, 2, 0.5, 0.5, 5);

        // 5. Material (The "Plastic")
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xe0e5ec, // Same as background
            roughness: 0.2,  // Smooth but matte
            metalness: 0.1,  // Slight metallic hint for specular
            clearcoat: 0.1,  // Polish
            clearcoatRoughness: 0.2
        });

        const button = new THREE.Mesh(geometry, material);
        button.castShadow = true;
        button.receiveShadow = true;
        scene.add(button);

        // 6. Ground Plane (To catch shadows)
        const planeGeometry = new THREE.PlaneGeometry(20, 20);
        const planeMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xe0e5ec,
            roughness: 0.4,
            side: THREE.DoubleSide
        });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.receiveShadow = true;
        plane.position.z = -0.3; // Just behind the button
        scene.add(plane);

        // 7. Lighting (Crucial for Neumorphism)
        // Standard Neumorphism: Light from Top-Left

        // Main Key Light (Creates the bright side & casts shadow to bottom-right)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(-5, 5, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        // Fill Light (Softens the shadows, ambient)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // High ambient to keep it light
        scene.add(ambientLight);

        // Rim Light? (Bottom right, creates the "dark" edge definition?)
        // In 3D, the shadow does that.
        // But Neumorphism also has a "light" shadow on the top left.
        // That's actually a reflection or a secondary light.
        // Let's add a darker light from bottom right? No, shadow handles dark.
        // We need a BRIGHT reflection on the top-left bevel. Specular handles that.

        // 8. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Slight hover motion
            button.rotation.x = Math.sin(Date.now() * 0.001) * 0.05;
            button.rotation.y = Math.sin(Date.now() * 0.001) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.left = -d * (window.innerWidth / window.innerHeight);
            camera.right = d * (window.innerWidth / window.innerHeight);
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
