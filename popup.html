<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Later</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Invisible scroll spacer - allows scrolling up to see header when content shifts -->
        <div id="scroll-spacer"></div>
        <header class="header">
            <h1>Watch Later</h1>
            <div class="header-controls">
                <button id="settings-cog" class="settings-cog" title="Settings">⚙️</button>
            </div>
        </header>
        <!-- Settings Dropdown -->
        <div id="settings-panel" class="settings-panel hidden">
            <button id="theme-toggle" class="settings-item">
                <span class="settings-icon">🌗</span>
                <span class="settings-label">Neumorphic</span>
            </button>
            <button id="dark-toggle" class="settings-item">
                <span class="settings-icon">🌙</span>
                <span class="settings-label">Dark Mode</span>
            </button>
            <button id="change-list-btn" class="settings-item">
                <span class="settings-icon">≣</span>
                <span class="settings-label">Switch List</span>
            </button>
        </div>
        <main>
            <div class="button-group">
                <button id="add-btn" class="primary-btn">Add Current Video</button>
                <button id="sync-btn" class="secondary-btn">Sync to Desktop</button>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search videos..." class="search-input">
                <button id="clear-search-btn" class="hidden">&times;</button>
            </div>
            <div id="message" class="hidden"></div>
            <ul id="video-list">
                <!-- Video items will be added here dynamically -->
            </ul>
            <div id="empty-state" class="hidden">No videos saved yet.</div>
        </main>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
